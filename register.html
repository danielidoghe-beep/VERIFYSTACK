<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VERIFYSTACK | Register</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<div class="logo">
VERIFYSTACK
</div>

<div class="subtitle">
Create Your Secure Account
</div>

<input
class="input"
type="text"
id="fullname"
placeholder="Full Name">

<input
class="input"
type="email"
id="email"
placeholder="Email Address">

<input
class="input"
type="password"
id="password"

class="input"
type="password"
id="confirmPassword"

class="btn"
id="registerBtn">

</button>

<div class="link">

</a>

<div class="footer">

</div>

</div>
