<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VERIFYSTACK | Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#081421;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

.container{

width:92%;
max-width:400px;

background:#102538;

border-radius:18px;

padding:35px 25px;

box-shadow:0 0 35px rgba(0,0,0,.45);

}

.logo{

font-size:34px;

font-weight:bold;

text-align:center;

color:#14b9ff;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#b7c7d8;

margin-bottom:30px;

}

.input{

width:100%;

padding:16px;

border:none;

outline:none;

border-radius:12px;

background:#1a334a;

color:white;

font-size:16px;

margin-bottom:18px;

}

.input::placeholder{

color:#9fb3c4;

}

.loginBtn{

width:100%;

padding:16px;

border:none;

border-radius:12px;

background:linear-gradient(90deg,#14b9ff,#007bff);

color:white;

font-size:17px;

font-weight:bold;

cursor:pointer;

}

.loginBtn:hover{

opacity:.9;

}

.register{

text-align:center;

margin-top:25px;

color:#c6d6e6;

}

.register a{

color:#14b9ff;

text-decoration:none;

font-weight:bold;

}

.footer{

margin-top:35px;

text-align:center;

font-size:13px;

color:#6f8294;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
VERIFYSTACK
</div>

<div class="subtitle">
Secure Investment Platform
</div>

<input
class="input"
type="email"
id="email"
placeholder="Email Address">

<input
class="input"
type="password"
id="password"
placeholder="Password">

<button
class="loginBtn"
id="loginBtn">
Login
</button>

<div class="register">

Don't have an account?

<a href="register.html">

Create Account

</a>

</div>

<div class="footer">

© 2026 VERIFYSTACK

</div>

</div>

<script type="module" src="./js/auth.js"></script>

</body>
</html>
