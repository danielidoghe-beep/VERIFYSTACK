<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERIFYSTACK - Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#08131f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
width:90%;
max-width:400px;
background:#102235;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

.logo{
text-align:center;
font-size:30px;
font-weight:bold;
color:#00c2ff;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#b8c7d9;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
background:#162c42;
border:none;
border-radius:10px;
color:white;
font-size:16px;
}

input::placeholder{
color:#9fb4c7;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#00c2ff;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00a8dd;
}

.link{
text-align:center;
margin-top:20px;
}

.link a{
color:#00c2ff;
text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">
VERIFYSTACK
</div>

<div class="subtitle">
Sign in to your account
</div>

<input
type="email"
id="email"
placeholder="Email Address">

<input
type="password"
id="password"
placeholder="Password">

<button id="loginBtn">
Login
</button>

<div class="link">
Don't have an account?
<a href="register.html">
Register
</a>
</div>

</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>
